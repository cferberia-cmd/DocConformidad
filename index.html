<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Conformidad AVRA</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --azul:#1a5276;--azul-claro:#2980b9;--gris-fondo:#f4f6f9;
  --borde:#ccc;--rojo:#c0392b;--verde:#27ae60;--blanco:#fff;
}
body{font-family:Arial,sans-serif;background:var(--gris-fondo);color:#222;font-size:15px;}
header{background:var(--azul);color:#fff;padding:14px 16px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:10px;}
header h1{font-size:16px;font-weight:700;flex:1;}
header small{font-size:11px;opacity:.8;display:block;margin-top:2px;}
.container{max-width:700px;margin:0 auto;padding:12px 12px 80px;}
.card{background:#fff;border-radius:10px;padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.card h2{font-size:13px;font-weight:700;color:var(--azul);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;padding-bottom:6px;border-bottom:2px solid var(--azul);}
.field{margin-bottom:12px;}
label{display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:4px;}
input,textarea,select{width:100%;border:1px solid var(--borde);border-radius:6px;padding:9px 10px;font-size:14px;font-family:inherit;background:#fff;transition:border .2s;}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--azul-claro);}
input.requerido-error,textarea.requerido-error{border-color:var(--rojo);background:#fff5f5;}
textarea{resize:vertical;min-height:70px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.gps-row{display:flex;gap:8px;align-items:flex-end;}
.gps-row input{flex:1;}
.btn-gps{background:var(--azul);color:#fff;border:none;border-radius:6px;padding:9px 12px;font-size:13px;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.btn-gps:active{opacity:.8;}
.gps-status{font-size:11px;color:#666;margin-top:4px;min-height:16px;}

/* Incidencia pattern */
.incidencia-row{display:flex;gap:6px;align-items:center;}
.inc-prefix{font-size:13px;color:#555;white-space:nowrap;}
.inc-part{border:1px solid var(--borde);border-radius:6px;padding:9px 8px;font-size:14px;font-family:monospace;text-transform:uppercase;}
.inc-sep{color:#555;font-size:15px;font-weight:bold;}

/* Firma */
.firma-wrap{position:relative;}
.firma-preview{width:100%;height:80px;border:1px dashed var(--borde);border-radius:6px;background:#fafafa;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;}
.firma-preview img{max-height:76px;max-width:100%;object-fit:contain;}
.firma-preview .placeholder{color:#999;font-size:13px;}
.btn-firma{display:block;width:100%;margin-top:6px;background:var(--azul);color:#fff;border:none;border-radius:6px;padding:8px;font-size:13px;cursor:pointer;}
.btn-borrar-firma{display:block;width:100%;margin-top:4px;background:#e8e8e8;color:#444;border:none;border-radius:6px;padding:7px;font-size:12px;cursor:pointer;}

/* Modal firma */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;flex-direction:column;}
.modal-overlay.active{display:flex;}
.modal-header{background:#fff;padding:10px 16px;display:flex;align-items:center;gap:10px;}
.modal-header h3{flex:1;font-size:14px;}
.modal-canvas-wrap{flex:1;display:flex;align-items:stretch;}
.modal-canvas-wrap canvas{flex:1;background:#fff;touch-action:none;}
.modal-footer{background:#fff;padding:10px 16px;display:flex;gap:8px;}
.btn-modal{flex:1;border:none;border-radius:6px;padding:10px;font-size:14px;cursor:pointer;font-weight:600;}
.btn-modal.borrar{background:#e8e8e8;color:#444;}
.btn-modal.cancelar{background:#bbb;color:#444;}
.btn-modal.guardar{background:var(--verde);color:#fff;}

/* Botones acción */
.fab-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #ddd;padding:10px 12px;display:flex;gap:8px;max-width:700px;margin:0 auto;}
.btn-main{flex:1;background:var(--azul);color:#fff;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;}
.btn-main:active{opacity:.8;}
.btn-reset{background:#e8e8e8;color:#555;border:none;border-radius:8px;padding:12px 14px;font-size:13px;cursor:pointer;}

/* Panel envío */
.send-panel{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;align-items:flex-end;}
.send-panel.active{display:flex;}
.send-inner{background:#fff;border-radius:14px 14px 0 0;padding:20px;width:100%;max-width:700px;margin:0 auto;}
.send-inner h3{font-size:15px;font-weight:700;margin-bottom:14px;text-align:center;}
.send-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.send-btn{display:flex;flex-direction:column;align-items:center;gap:6px;background:#f4f6f9;border:none;border-radius:10px;padding:14px 10px;cursor:pointer;font-size:12px;font-weight:600;color:#333;}
.send-btn .ico{font-size:26px;}
.send-btn.whatsapp{background:#e8f5e9;color:#1b5e20;}
.send-btn.email{background:#e3f2fd;color:#0d47a1;}
.send-btn.onedrive{background:#e8eaf6;color:#283593;}
.send-btn.share{background:#f3e5f5;color:#4a148c;}
.btn-cerrar-send{width:100%;background:#eee;border:none;border-radius:8px;padding:10px;font-size:13px;cursor:pointer;}

/* Alert */
.alert{display:none;position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#c0392b;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:400;text-align:center;max-width:90vw;box-shadow:0 4px 12px rgba(0,0,0,.2);}
.alert.show{display:block;}
.alert.ok{background:#27ae60;}

/* Loading */
.loading-overlay{display:none;position:fixed;inset:0;background:rgba(255,255,255,.85);z-index:500;flex-direction:column;align-items:center;justify-content:center;gap:12px;}
.loading-overlay.active{display:flex;}
.spinner{width:40px;height:40px;border:4px solid #ddd;border-top-color:var(--azul);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:14px;color:#555;}
</style>
</head>
<body>

<header>
  <div>
    <h1>🏗️ Conformidad Final de Servicio</h1>
    <small>Documento AVRA — Reparaciones</small>
  </div>
</header>

<div class="container">

  <!-- INCIDENCIA -->
  <div class="card">
    <h2>Nº de Incidencia</h2>
    <div class="field">
      <label>Referencia de incidencia <span style="color:red">*</span></label>
      <div class="incidencia-row">
        <span class="inc-prefix">JA-</span>
        <input class="inc-part" id="inc_parte1" maxlength="10" placeholder="REDA" style="width:90px">
        <span class="inc-sep">-</span>
        <input class="inc-part" id="inc_parte2" maxlength="10" placeholder="000" style="width:70px">
        <span class="inc-sep">-</span>
        <input class="inc-part" id="inc_anio" maxlength="4" placeholder="20__" style="width:65px" type="number" min="2020" max="2099">
      </div>
    </div>
  </div>

  <!-- DATOS INMUEBLE -->
  <div class="card">
    <h2>📍 Datos del Inmueble</h2>
    <div class="field">
      <label>GPS / Dirección</label>
      <div class="gps-row">
        <input type="text" id="gps_display" placeholder="Pulsa para obtener ubicación" readonly>
        <button class="btn-gps" onclick="obtenerGPS()">📡 GPS</button>
      </div>
      <div class="gps-status" id="gps_status"></div>
    </div>
    <div class="grid2">
      <div class="field">
        <label>Promoción <span style="color:red">*</span></label>
        <input type="text" id="promocion" placeholder="Nombre de la promoción">
      </div>
      <div class="field">
        <label>Matrícula</label>
        <input type="text" id="matricula" placeholder="Matrícula">
      </div>
    </div>
    <div class="grid2">
      <div class="field">
        <label>Municipio</label>
        <input type="text" id="municipio" placeholder="Municipio">
      </div>
      <div class="field">
        <label>Provincia</label>
        <input type="text" id="provincia" placeholder="Provincia">
      </div>
    </div>
    <div class="field">
      <label>Emplazamiento / Dirección</label>
      <input type="text" id="emplazamiento" placeholder="Calle, número...">
    </div>
    <div class="field">
      <label>Nº Finca</label>
      <input type="text" id="num_finca" placeholder="Número de finca">
    </div>
  </div>

  <!-- EMPRESA CONTRATISTA -->
  <div class="card">
    <h2>🏢 Representante del Contratista</h2>
    <div class="field">
      <label>Nombre y apellidos <span style="color:red">*</span></label>
      <input type="text" id="rep_nombre" placeholder="D/Dª...">
    </div>
    <div class="field">
      <label>DNI <span style="color:red">*</span></label>
      <input type="text" id="rep_dni" placeholder="00000000X">
    </div>
    <div class="field">
      <label>Descripción de los trabajos realizados <span style="color:red">*</span></label>
      <textarea id="desc_trabajos" rows="4" placeholder="Descripción de los servicios de reparación..."></textarea>
    </div>
    <div class="grid2">
      <div class="field">
        <label>Fecha finalización trabajos <span style="color:red">*</span></label>
        <input type="date" id="fecha_fin">
      </div>
      <div class="field">
        <label>Fecha correo AVRA <span style="color:red">*</span></label>
        <input type="date" id="fecha_correo">
      </div>
    </div>
  </div>

  <!-- RESPONSABLE AVRA -->
  <div class="card">
    <h2>🏛️ Responsable AVRA</h2>
    <div class="field">
      <label>Nombre y apellidos <span style="color:red">*</span></label>
      <input type="text" id="resp_avra" placeholder="D/Dª...">
    </div>
  </div>

  <!-- FECHA Y LUGAR DE FIRMA -->
  <div class="card">
    <h2>📅 Lugar y Fecha de Firma</h2>
    <div class="grid2">
      <div class="field">
        <label>Lugar <span style="color:red">*</span></label>
        <input type="text" id="lugar_firma" placeholder="Ciudad" value="Jaén">
      </div>
      <div class="field">
        <label>Fecha <span style="color:red">*</span></label>
        <input type="date" id="fecha_firma">
      </div>
    </div>
  </div>

  <!-- FIRMAS -->
  <div class="card">
    <h2>✍️ Firmas</h2>
    <div class="grid2">
      <div>
        <label style="font-size:12px;font-weight:600;color:#555;display:block;margin-bottom:6px;">Conforme AVRA</label>
        <div class="firma-preview" id="prev_avra" onclick="abrirFirma('avra')">
          <span class="placeholder" id="ph_avra">Toca para firmar</span>
          <img id="img_avra" style="display:none">
        </div>
        <input type="text" id="nombre_avra" placeholder="Nombre firmante AVRA" style="margin-top:6px;font-size:13px;">
        <button class="btn-borrar-firma" onclick="borrarFirma('avra')">🗑 Borrar firma</button>
      </div>
      <div>
        <label style="font-size:12px;font-weight:600;color:#555;display:block;margin-bottom:6px;">Conforme el Contratista</label>
        <div class="firma-preview" id="prev_cont" onclick="abrirFirma('cont')">
          <span class="placeholder" id="ph_cont">Toca para firmar</span>
          <img id="img_cont" style="display:none">
        </div>
        <input type="text" id="nombre_cont" placeholder="Nombre firmante contratista" style="margin-top:6px;font-size:13px;">
        <button class="btn-borrar-firma" onclick="borrarFirma('cont')">🗑 Borrar firma</button>
      </div>
    </div>
  </div>

</div><!-- /container -->

<!-- FAB BAR -->
<div class="fab-bar">
  <button class="btn-reset" onclick="resetForm()">↩ Nuevo</button>
  <button class="btn-main" onclick="generarDocumento()">📄 Generar ZIP</button>
</div>

<!-- MODAL FIRMA -->
<div class="modal-overlay" id="modal-firma">
  <div class="modal-header">
    <h3 id="modal-firma-titulo">Firmar</h3>
    <button style="border:none;background:none;font-size:20px;cursor:pointer;" onclick="cerrarModal()">✕</button>
  </div>
  <div class="modal-canvas-wrap">
    <canvas id="firma-canvas"></canvas>
  </div>
  <div class="modal-footer">
    <button class="btn-modal borrar" onclick="limpiarCanvas()">🗑 Borrar</button>
    <button class="btn-modal cancelar" onclick="cerrarModal()">Cancelar</button>
    <button class="btn-modal guardar" onclick="guardarFirma()">✓ Guardar</button>
  </div>
</div>

<!-- PANEL ENVÍO -->
<div class="send-panel" id="send-panel">
  <div class="send-inner">
    <h3>📤 Enviar documento</h3>
    <div class="send-btns">
      <button class="send-btn whatsapp" onclick="enviarWhatsApp()">
        <span class="ico">💬</span>WhatsApp
      </button>
      <button class="send-btn email" onclick="enviarEmail()">
        <span class="ico">✉️</span>Email
      </button>
      <button class="send-btn onedrive" onclick="enviarOneDrive()">
        <span class="ico">☁️</span>OneDrive
      </button>
      <button class="send-btn share" onclick="enviarNativo()">
        <span class="ico">📤</span>Compartir
      </button>
    </div>
    <button class="btn-cerrar-send" onclick="cerrarSend()">Cerrar</button>
  </div>
</div>

<!-- ALERT -->
<div class="alert" id="alert-msg"></div>

<!-- LOADING -->
<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-txt" id="loading-txt">Generando documento...</div>
</div>

<script>
// ===================== ESTADO =====================
let firmaData = { avra: null, cont: null };
let firmaActiva = null;
let ultimoZipBlob = null;
let ultimoNombreArchivo = '';
let isDrawing = false;
let lastX = 0, lastY = 0;
const DB_NAME = 'conformidad_avra_db';
const DB_STORE = 'form_data';
let db = null;

// ===================== INDEXEDDB =====================
function initDB() {
  const req = indexedDB.open(DB_NAME, 1);
  req.onupgradeneeded = e => {
    e.target.result.createObjectStore(DB_STORE);
  };
  req.onsuccess = e => {
    db = e.target.result;
    cargarEstado();
  };
}

function guardarEstado() {
  if (!db) return;
  const data = recogerFormulario(false);
  data._firmaAvra = firmaData.avra;
  data._firmaCont = firmaData.cont;
  const tx = db.transaction(DB_STORE, 'readwrite');
  tx.objectStore(DB_STORE).put(data, 'current');
}

function cargarEstado() {
  if (!db) return;
  const tx = db.transaction(DB_STORE, 'readonly');
  const req = tx.objectStore(DB_STORE).get('current');
  req.onsuccess = e => {
    const d = e.target.result;
    if (!d) return;
    const campos = ['inc_parte1','inc_parte2','inc_anio','promocion','matricula',
      'municipio','provincia','emplazamiento','num_finca','rep_nombre','rep_dni',
      'desc_trabajos','fecha_fin','fecha_correo','resp_avra','lugar_firma',
      'fecha_firma','nombre_avra','nombre_cont'];
    campos.forEach(id => { if (d[id] !== undefined) { const el = document.getElementById(id); if(el) el.value = d[id]; } });
    if (d._firmaAvra) setFirmaImg('avra', d._firmaAvra);
    if (d._firmaCont) setFirmaImg('cont', d._firmaCont);
  };
}

// Auto-save on changes
document.addEventListener('input', () => setTimeout(guardarEstado, 300));
window.addEventListener('beforeunload', guardarEstado);

// ===================== GPS =====================
async function obtenerGPS() {
  const btn = document.querySelector('.btn-gps');
  const status = document.getElementById('gps_status');
  const display = document.getElementById('gps_display');
  btn.textContent = '⏳';
  btn.disabled = true;
  status.textContent = 'Obteniendo posición...';

  if (!navigator.geolocation) {
    status.textContent = 'GPS no disponible';
    btn.textContent = '📡 GPS'; btn.disabled = false; return;
  }

  navigator.geolocation.getCurrentPosition(async pos => {
    const lat = pos.coords.latitude.toFixed(6);
    const lon = pos.coords.longitude.toFixed(6);
    display.value = `${lat}, ${lon}`;
    status.textContent = '✓ Posición obtenida. Geocodificando...';
    try {
      const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&addressdetails=1&accept-language=es`, {headers:{'User-Agent':'ConformidadAVRA/1.0'}});
      const j = await r.json();
      const a = j.address || {};
      const mun = a.city || a.town || a.village || a.municipality || '';
      const prov = a.province || a.state || '';
      const calle = a.road || a.pedestrian || '';
      const num = a.house_number || '';
      const empl = [calle, num].filter(Boolean).join(' ');

      if (mun) document.getElementById('municipio').value = mun;
      if (prov) document.getElementById('provincia').value = prov;
      if (empl) document.getElementById('emplazamiento').value = empl;
      display.value = empl || `${lat}, ${lon}`;
      status.textContent = '✓ Dirección completada';
    } catch(e) {
      status.textContent = '⚠ Posición obtenida, geocodificación fallida';
    }
    btn.textContent = '📡 GPS'; btn.disabled = false;
    guardarEstado();
  }, err => {
    status.textContent = 'Error GPS: ' + (err.code === 1 ? 'Permiso denegado' : err.message);
    btn.textContent = '📡 GPS'; btn.disabled = false;
  }, { enableHighAccuracy: true, timeout: 15000 });
}

// ===================== FIRMA =====================
const modal = document.getElementById('modal-firma');
const canvas = document.getElementById('firma-canvas');
let ctx = null;

function abrirFirma(tipo) {
  firmaActiva = tipo;
  document.getElementById('modal-firma-titulo').textContent = tipo === 'avra' ? 'Firmar — Conforme AVRA' : 'Firmar — Conforme Contratista';
  modal.classList.add('active');
  setTimeout(() => {
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
    ctx = canvas.getContext('2d');
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
  }, 50);
}

function limpiarCanvas() {
  if (!ctx) return;
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function cerrarModal() {
  modal.classList.remove('active');
  firmaActiva = null;
}

function guardarFirma() {
  if (!canvas || !ctx) return;
  const data = canvas.toDataURL('image/png');
  setFirmaImg(firmaActiva, data);
  firmaData[firmaActiva] = data;
  cerrarModal();
  guardarEstado();
}

function setFirmaImg(tipo, data) {
  const img = document.getElementById('img_' + tipo);
  const ph = document.getElementById('ph_' + tipo);
  img.src = data;
  img.style.display = 'block';
  ph.style.display = 'none';
  firmaData[tipo] = data;
}

function borrarFirma(tipo) {
  firmaData[tipo] = null;
  const img = document.getElementById('img_' + tipo);
  const ph = document.getElementById('ph_' + tipo);
  img.src = '';
  img.style.display = 'none';
  ph.style.display = 'block';
  guardarEstado();
}

// Canvas drawing events
canvas.addEventListener('mousedown', e => { isDrawing = true; [lastX,lastY] = [e.offsetX,e.offsetY]; });
canvas.addEventListener('mousemove', e => {
  if (!isDrawing || !ctx) return;
  ctx.beginPath(); ctx.moveTo(lastX,lastY); ctx.lineTo(e.offsetX,e.offsetY); ctx.stroke();
  [lastX,lastY] = [e.offsetX,e.offsetY];
});
canvas.addEventListener('mouseup', () => isDrawing = false);
canvas.addEventListener('mouseleave', () => isDrawing = false);

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0]; const r = canvas.getBoundingClientRect();
  isDrawing = true; lastX = t.clientX-r.left; lastY = t.clientY-r.top;
}, {passive:false});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!isDrawing || !ctx) return;
  const t = e.touches[0]; const r = canvas.getBoundingClientRect();
  const x = t.clientX-r.left, y = t.clientY-r.top;
  ctx.beginPath(); ctx.moveTo(lastX,lastY); ctx.lineTo(x,y); ctx.stroke();
  lastX = x; lastY = y;
}, {passive:false});
canvas.addEventListener('touchend', () => isDrawing = false);

// ===================== UTILIDADES =====================
function mostrarAlerta(msg, tipo='error') {
  const el = document.getElementById('alert-msg');
  el.textContent = msg;
  el.className = 'alert show' + (tipo==='ok' ? ' ok' : '');
  setTimeout(() => el.className = 'alert', 3000);
}

function mostrarLoading(txt='Generando...') {
  document.getElementById('loading-txt').textContent = txt;
  document.getElementById('loading').classList.add('active');
}

function ocultarLoading() {
  document.getElementById('loading').classList.remove('active');
}

function formatFechaES(isoDate) {
  if (!isoDate) return '';
  const [y,m,d] = isoDate.split('-');
  const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return { dia: parseInt(d), mes: meses[parseInt(m)-1], anio: y, display: `${parseInt(d)} de ${meses[parseInt(m)-1]} de ${y}` };
}

function formatFechaCorta(isoDate) {
  if (!isoDate) return '';
  const [y,m,d] = isoDate.split('-');
  return `${d}/${m}/${y}`;
}

// ===================== RECOGER FORMULARIO =====================
function recogerFormulario(validar=true) {
  const v = id => (document.getElementById(id)||{}).value||'';
  const num_inc = `JA-${v('inc_parte1').toUpperCase()}-${v('inc_parte2').toUpperCase()}-${v('inc_anio')}`;

  const data = {
    inc_parte1: v('inc_parte1'), inc_parte2: v('inc_parte2'), inc_anio: v('inc_anio'),
    promocion: v('promocion'), matricula: v('matricula'), municipio: v('municipio'),
    provincia: v('provincia'), emplazamiento: v('emplazamiento'), num_finca: v('num_finca'),
    rep_nombre: v('rep_nombre'), rep_dni: v('rep_dni'), desc_trabajos: v('desc_trabajos'),
    fecha_fin: v('fecha_fin'), fecha_correo: v('fecha_correo'), resp_avra: v('resp_avra'),
    lugar_firma: v('lugar_firma'), fecha_firma: v('fecha_firma'),
    nombre_avra: v('nombre_avra'), nombre_cont: v('nombre_cont'),
  };

  if (!validar) return data;

  // Validación
  const requeridos = [
    ['inc_parte1','Parte 1 del nº de incidencia'],
    ['inc_parte2','Parte 2 del nº de incidencia'],
    ['inc_anio','Año de la incidencia'],
    ['promocion','Promoción'],
    ['rep_nombre','Nombre del representante contratista'],
    ['rep_dni','DNI del representante'],
    ['desc_trabajos','Descripción de los trabajos'],
    ['fecha_fin','Fecha de finalización'],
    ['fecha_correo','Fecha del correo AVRA'],
    ['resp_avra','Nombre del responsable AVRA'],
    ['lugar_firma','Lugar de firma'],
    ['fecha_firma','Fecha de firma'],
  ];

  document.querySelectorAll('.requerido-error').forEach(el => el.classList.remove('requerido-error'));
  let errores = [];
  requeridos.forEach(([id, label]) => {
    if (!data[id]) {
      document.getElementById(id).classList.add('requerido-error');
      errores.push(label);
    }
  });
  if (errores.length) {
    mostrarAlerta('Campos obligatorios: ' + errores.slice(0,3).join(', ') + (errores.length>3 ? '...' : ''));
    return null;
  }

  return data;
}

// ===================== GENERAR DOCUMENTO =====================
async function generarDocumento() {
  const data = recogerFormulario(true);
  if (!data) return;

  mostrarLoading('Preparando documento...');

  await new Promise(r => setTimeout(r, 100));

  try {
    const num_inc = `JA-${data.inc_parte1.toUpperCase()}-${data.inc_parte2.toUpperCase()}-${data.inc_anio}`;
    const fechaFin = formatFechaCorta(data.fecha_fin);
    const fechaCorreo = formatFechaCorta(data.fecha_correo);
    const fd = formatFechaES(data.fecha_firma);

    // Load template
    const templateBin = Uint8Array.from(atob(TEMPLATE_B64), c => c.charCodeAt(0));
    const zip = new PizZip(templateBin);
    const doc = new Docxtemplater(zip, { paragraphLoop: true, linebreaks: true });

    doc.render({
      NUM_INCIDENCIA: num_inc,
      PROMOCION: data.promocion,
      MATRICULA: data.matricula || '',
      MUNICIPIO: data.municipio || '',
      PROVINCIA: data.provincia || '',
      EMPLAZAMIENTO: data.emplazamiento || '',
      NUM_FINCA: data.num_finca || '',
      ASUNTO: 'SERVICIO DE REPARACIONES DE DAÑOS',
      REP_NOMBRE: data.rep_nombre,
      REP_DNI: data.rep_dni,
      DESC_TRABAJOS: data.desc_trabajos + ' ',
      FECHA_FIN: fechaFin,
      FECHA_CORREO: fechaCorreo,
      RESP_AVRA: data.resp_avra,
      LUGAR_FIRMA: data.lugar_firma,
      DIA_FIRMA: fd ? String(fd.dia) : '',
      MES_FIRMA: fd ? fd.mes : '',
      ANIO_FIRMA: fd ? fd.anio : '',
      FIRMA_AVRA_NOMBRE: data.nombre_avra || '',
      FIRMA_CONTRATISTA_NOMBRE: data.nombre_cont || '',
    });

    const docxBlob = doc.getZip().generate({ type: 'blob', mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });

    mostrarLoading('Preparando ZIP...');
    await new Promise(r => setTimeout(r, 50));

    // Build ZIP with docx + (optional) signatures note
    const jszip = new JSZip();
    const nombreBase = `Conformidad_${num_inc.replace(/[^a-zA-Z0-9_-]/g,'_')}`;
    jszip.file(`${nombreBase}.docx`, docxBlob);

    // Add signatures as PNG if present
    if (firmaData.avra) {
      const firmaAvraData = firmaData.avra.replace(/^data:image\/png;base64,/, '');
      jszip.file('firmas/firma_AVRA.png', firmaAvraData, {base64: true});
    }
    if (firmaData.cont) {
      const firmaContData = firmaData.cont.replace(/^data:image\/png;base64,/, '');
      jszip.file('firmas/firma_Contratista.png', firmaContData, {base64: true});
    }

    // Info TXT
    const infoTxt = [
      `DOCUMENTO DE CONFORMIDAD FINAL`,
      `Incidencia: ${num_inc}`,
      `Promoción: ${data.promocion}`,
      `Municipio: ${data.municipio || '-'}`,
      `Provincia: ${data.provincia || '-'}`,
      `Emplazamiento: ${data.emplazamiento || '-'}`,
      `Nº Finca: ${data.num_finca || '-'}`,
      `Representante contratista: ${data.rep_nombre} (DNI: ${data.rep_dni})`,
      `Fecha finalización: ${fechaFin}`,
      `Fecha correo AVRA: ${fechaCorreo}`,
      `Responsable AVRA: ${data.resp_avra}`,
      `Lugar y fecha firma: ${data.lugar_firma}, ${fd ? fd.display : ''}`,
      ``,
      `Generado: ${new Date().toLocaleString('es-ES')}`,
    ].join('\n');
    jszip.file('info.txt', infoTxt);

    mostrarLoading('Comprimiendo ZIP...');
    const zipBlob = await jszip.generateAsync({ type: 'blob', compression: 'DEFLATE' });
    ultimoZipBlob = zipBlob;
    ultimoNombreArchivo = `${nombreBase}.zip`;

    // Descargar ZIP
    const url = URL.createObjectURL(zipBlob);
    const a = document.createElement('a');
    a.href = url; a.download = ultimoNombreArchivo; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 5000);

    ocultarLoading();
    mostrarAlerta('✓ ZIP generado correctamente', 'ok');
    setTimeout(() => document.getElementById('send-panel').classList.add('active'), 1200);

  } catch(e) {
    ocultarLoading();
    console.error(e);
    mostrarAlerta('Error generando documento: ' + (e.message || e));
  }
}

// ===================== ENVÍO =====================
function cerrarSend() { document.getElementById('send-panel').classList.remove('active'); }

function enviarWhatsApp() {
  const d = recogerFormulario(false);
  const num_inc = `JA-${(d.inc_parte1||'').toUpperCase()}-${(d.inc_parte2||'').toUpperCase()}-${d.inc_anio||''}`;
  const msg = `*Conformidad Final AVRA*\nIncidencia: ${num_inc}\nPromoción: ${d.promocion||'-'}\nMunicipio: ${d.municipio||'-'}\nResponsable AVRA: ${d.resp_avra||'-'}`;
  window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank');
}

function enviarEmail() {
  const d = recogerFormulario(false);
  const num_inc = `JA-${(d.inc_parte1||'').toUpperCase()}-${(d.inc_parte2||'').toUpperCase()}-${d.inc_anio||''}`;
  const subj = `Conformidad Final ${num_inc} — ${d.promocion||''}`;
  const body = `Adjunto el documento de conformidad final de servicio.\n\nIncidencia: ${num_inc}\nPromoción: ${d.promocion||'-'}\nMunicipio: ${d.municipio||'-'}`;
  window.open(`mailto:?subject=${encodeURIComponent(subj)}&body=${encodeURIComponent(body)}`, '_blank');
}

function enviarOneDrive() {
  window.open('https://onedrive.live.com/', '_blank');
}

async function enviarNativo() {
  if (!ultimoZipBlob) { mostrarAlerta('Primero genera el documento'); return; }
  if (navigator.share && navigator.canShare) {
    const file = new File([ultimoZipBlob], ultimoNombreArchivo, {type:'application/zip'});
    if (navigator.canShare({ files: [file] })) {
      try { await navigator.share({ files: [file], title: ultimoNombreArchivo }); return; } catch(e) {}
    }
  }
  // Fallback: re-download
  const url = URL.createObjectURL(ultimoZipBlob);
  const a = document.createElement('a'); a.href = url; a.download = ultimoNombreArchivo; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 5000);
}

// ===================== RESET =====================
function resetForm() {
  if (!confirm('¿Borrar todos los datos e iniciar un nuevo documento?')) return;
  const campos = ['inc_parte1','inc_parte2','inc_anio','promocion','matricula',
    'municipio','provincia','emplazamiento','num_finca','rep_nombre','rep_dni',
    'desc_trabajos','fecha_fin','fecha_correo','resp_avra','lugar_firma',
    'fecha_firma','nombre_avra','nombre_cont','gps_display'];
  campos.forEach(id => { const el = document.getElementById(id); if(el) el.value = ''; });
  document.getElementById('gps_status').textContent = '';
  document.getElementById('lugar_firma').value = 'Jaén';
  borrarFirma('avra'); borrarFirma('cont');
  firmaData = { avra: null, cont: null };
  ultimoZipBlob = null;
  if (db) { const tx = db.transaction(DB_STORE,'readwrite'); tx.objectStore(DB_STORE).delete('current'); }
  mostrarAlerta('✓ Formulario reiniciado', 'ok');
}
